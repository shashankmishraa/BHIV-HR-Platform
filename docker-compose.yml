# BHIV HR Platform - Development Docker Compose
# Simplified version for quick development setup

version: '3.8'

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: bhiv_hr_nqzb
      POSTGRES_USER: bhiv_user
      POSTGRES_PASSWORD: B7iZSA0S3y6QCopt0UTxmnEQsJmxtf9J
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhiv_user -d bhiv_hr_nqzb"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://bhiv_user:B7iZSA0S3y6QCopt0UTxmnEQsJmxtf9J@db:5432/bhiv_hr_nqzb
      API_KEY_SECRET: myverysecureapikey123
      JWT_SECRET: dev_jwt_secret_key_12345
      ENVIRONMENT: development
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    build: ./services/agent
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgresql://bhiv_user:B7iZSA0S3y6QCopt0UTxmnEQsJmxtf9J@db:5432/bhiv_hr_nqzb
      API_KEY_SECRET: myverysecureapikey123
      JWT_SECRET: dev_jwt_secret_key_12345
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  portal:
    build: ./services/portal
    ports:
      - "8501:8501"
    environment:
      GATEWAY_URL: http://gateway:8000
      AGENT_SERVICE_URL: http://agent:9000
      API_KEY_SECRET: myverysecureapikey123
      ENVIRONMENT: development
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  client_portal:
    build: ./services/client_portal
    ports:
      - "8502:8502"
    environment:
      GATEWAY_URL: http://gateway:8000
      AGENT_SERVICE_URL: http://agent:9000
      API_KEY_SECRET: myverysecureapikey123
      DATABASE_URL: postgresql://bhiv_user:B7iZSA0S3y6QCopt0UTxmnEQsJmxtf9J@db:5432/bhiv_hr_nqzb
      ENVIRONMENT: development
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: