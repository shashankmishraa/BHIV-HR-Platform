name: Docker BuildKit Fix & Fallback

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild with BuildKit fixes'
        required: false
        default: false
        type: boolean

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  buildkit-diagnostics:
    name: BuildKit Diagnostics & Fix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Docker System Info
        run: |
          echo "::group::Docker System Information"
          docker version
          docker info
          docker system df
          echo "::endgroup::"
      
      - name: BuildKit Status Check
        run: |
          echo "::group::BuildKit Status"
          # Check if BuildKit is available
          if docker buildx version; then
            echo "✅ BuildKit available"
            docker buildx ls
          else
            echo "❌ BuildKit not available"
          fi
          echo "::endgroup::"
      
      - name: Setup BuildKit
        run: |
          echo "::group::BuildKit Setup"
          # Create new builder instance
          docker buildx create --name bhiv-builder --driver docker-container --bootstrap || true
          docker buildx use bhiv-builder
          docker buildx inspect --bootstrap
          echo "::endgroup::"
      
      - name: Test Build Gateway
        run: |
          echo "::group::Test Gateway Build"
          cd services/gateway
          docker buildx build \
            --platform linux/amd64 \
            --tag bhiv-gateway:test \
            --load \
            --progress=plain \
            . || echo "::warning::Gateway build failed"
          echo "::endgroup::"
      
      - name: Test Build Agent
        run: |
          echo "::group::Test Agent Build"
          cd services/agent
          docker buildx build \
            --platform linux/amd64 \
            --tag bhiv-agent:test \
            --load \
            --progress=plain \
            . || echo "::warning::Agent build failed"
          echo "::endgroup::"
      
      - name: Cleanup
        if: always()
        run: |
          docker buildx rm bhiv-builder || true
          docker system prune -f || true

  fallback-deployment:
    name: Fallback Deployment Strategy
    runs-on: ubuntu-latest
    needs: buildkit-diagnostics
    if: always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Alternative Build Strategy
        run: |
          echo "::group::Alternative Build Without BuildKit"
          
          # Disable BuildKit for fallback
          export DOCKER_BUILDKIT=0
          
          cd services/gateway
          docker build -t bhiv-gateway:fallback . || echo "::warning::Fallback build failed"
          
          cd ../agent
          docker build -t bhiv-agent:fallback . || echo "::warning::Fallback build failed"
          
          echo "::endgroup::"
      
      - name: Render Direct Deploy
        run: |
          echo "::group::Render Native Deployment"
          echo "✅ Using Render's native build system (recommended)"
          echo "No Docker BuildKit required for Render deployment"
          echo "Services deploy directly from Git repository"
          echo "::endgroup::"