name: Fast Health Check
on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

env:
  GATEWAY_URL: https://bhiv-hr-gateway-46pz.onrender.com
  AGENT_URL: https://bhiv-hr-agent-m1me.onrender.com
  PORTAL_URL: https://bhiv-hr-portal-cead.onrender.com
  CLIENT_PORTAL_URL: https://bhiv-hr-client-portal-5g33.onrender.com

jobs:
  health-check:
    name: Quick Health Verification
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Critical Services Health
        run: |
          echo "🔍 Critical services health check..."
          
          # Gateway - Critical
          if curl -f -s --max-time 10 $GATEWAY_URL/health/probe > /dev/null; then
            echo "✅ Gateway: Healthy"
          else
            echo "❌ Gateway: Unhealthy"
            exit 1
          fi
          
          # AI Agent - Critical
          if curl -f -s --max-time 10 $AGENT_URL/health > /dev/null; then
            echo "✅ AI Agent: Healthy"
          else
            echo "❌ AI Agent: Unhealthy"
            exit 1
          fi
      
      - name: Portal Accessibility
        run: |
          echo "🌐 Portal accessibility check..."
          
          # Portals - Non-critical
          curl -f -s --max-time 8 $PORTAL_URL > /dev/null && echo "✅ HR Portal: Accessible" || echo "⚠️ HR Portal: Check needed"
          curl -f -s --max-time 8 $CLIENT_PORTAL_URL > /dev/null && echo "✅ Client Portal: Accessible" || echo "⚠️ Client Portal: Check needed"
      
      - name: Status Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "::notice title=Health Check::✅ All critical services healthy"
          else
            echo "::error title=Health Check::❌ Critical services need attention"
          fi