name: Direct Deploy & Health Check
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12.7'

jobs:
  quick-deploy:
    name: Quick Deploy & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Quick Lint Check
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          black --check . || echo "Formatting issues found but continuing"
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Lint issues found but continuing"
      
      - name: Wait for Render Deployment
        run: |
          echo "Waiting for Render auto-deployment to complete..."
          sleep 60
      
      - name: Health Check - Gateway
        run: |
          echo "Testing Gateway health..."
          for i in {1..10}; do
            if curl -f -s https://bhiv-hr-gateway-901a.onrender.com/health; then
              echo "✅ Gateway healthy"
              break
            else
              echo "⏳ Attempt $i/10 - waiting..."
              sleep 15
            fi
          done
      
      - name: Health Check - AI Agent
        run: |
          echo "Testing AI Agent health..."
          for i in {1..10}; do
            if curl -f -s https://bhiv-hr-agent-o6nx.onrender.com/health; then
              echo "✅ AI Agent healthy"
              break
            else
              echo "⏳ Attempt $i/10 - waiting..."
              sleep 15
            fi
          done
      
      - name: Comprehensive Health Verification
        run: |
          echo "Running comprehensive health checks..."
          python -c "
          import requests
          import sys
          
          services = {
              'Gateway': 'https://bhiv-hr-gateway-901a.onrender.com',
              'AI Agent': 'https://bhiv-hr-agent-o6nx.onrender.com'
          }
          
          all_healthy = True
          
          for name, url in services.items():
              try:
                  # Basic health
                  response = requests.get(f'{url}/health', timeout=10)
                  if response.status_code == 200:
                      print(f'✅ {name}: Healthy')
                  else:
                      print(f'❌ {name}: Unhealthy ({response.status_code})')
                      all_healthy = False
                  
                  # Detailed health
                  response = requests.get(f'{url}/health/detailed', timeout=10)
                  if response.status_code == 200:
                      print(f'✅ {name} Detailed: OK')
                  else:
                      print(f'⚠️ {name} Detailed: {response.status_code}')
                  
                  # Metrics
                  response = requests.get(f'{url}/metrics', timeout=10)
                  if response.status_code == 200:
                      print(f'✅ {name} Metrics: OK')
                  else:
                      print(f'⚠️ {name} Metrics: {response.status_code}')
                      
              except Exception as e:
                  print(f'❌ {name}: Error - {str(e)}')
                  all_healthy = False
          
          if not all_healthy:
              print('❌ Some services are unhealthy')
              sys.exit(1)
          else:
              print('🎉 All services are healthy!')
          "
      
      - name: Performance Check
        run: |
          echo "Testing response times..."
          python -c "
          import requests
          import time
          
          services = {
              'Gateway': 'https://bhiv-hr-gateway-901a.onrender.com/health',
              'AI Agent': 'https://bhiv-hr-agent-o6nx.onrender.com/health'
          }
          
          for name, url in services.items():
              times = []
              for i in range(3):
                  start = time.time()
                  response = requests.get(url, timeout=10)
                  duration = time.time() - start
                  times.append(duration)
              
              avg_time = sum(times) / len(times)
              print(f'{name}: {avg_time:.3f}s average')
              
              if avg_time > 2.0:
                  print(f'⚠️ {name} response time is high')
              else:
                  print(f'✅ {name} response time is good')
          "
      
      - name: Deployment Success
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "✅ All health checks passed"
          echo "📊 Services are operational"
          echo "🔗 Gateway: https://bhiv-hr-gateway-901a.onrender.com"
          echo "🔗 AI Agent: https://bhiv-hr-agent-o6nx.onrender.com"
      
      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "🔍 Check service logs for issues"
          echo "🔄 Services may need manual restart"
          exit 1