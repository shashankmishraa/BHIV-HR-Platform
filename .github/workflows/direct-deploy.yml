name: Fast Deploy & Verify

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12.7'

concurrency:
  group: fast-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-deploy:
    name: Fast Deploy & Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    environment:
      name: production
      url: https://bhiv-hr-gateway-901a.onrender.com
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Quick Code Quality Check
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black
          
          echo "::group::Code Formatting"
          black --check --diff . || echo "::warning::Formatting issues detected"
          echo "::endgroup::"
          
          echo "::group::Critical Linting"
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --format=github
          echo "::endgroup::"
        continue-on-error: true
      
      - name: Wait for Auto-Deploy
        run: |
          echo "::notice::Waiting for Render auto-deployment..."
          sleep 75
      
      - name: Service Health Verification
        id: health-check
        run: |
          echo "::group::Health Check Verification"
          
          services=(
            "Gateway:https://bhiv-hr-gateway-901a.onrender.com"
            "AI-Agent:https://bhiv-hr-agent-o6nx.onrender.com"
          )
          
          failed_services=()
          
          for service_info in "${services[@]}"; do
            IFS=':' read -r name url <<< "$service_info"
            echo "Testing $name..."
            
            for attempt in {1..8}; do
              if curl -f -s --max-time 10 "$url/health" > /dev/null; then
                echo "✅ $name: Healthy (attempt $attempt)"
                break
              else
                if [ $attempt -eq 8 ]; then
                  echo "❌ $name: Failed after 8 attempts"
                  failed_services+=("$name")
                else
                  echo "⏳ $name: Attempt $attempt/8, retrying..."
                  sleep 12
                fi
              fi
            done
          done
          
          if [ ${#failed_services[@]} -gt 0 ]; then
            echo "::error::Failed services: ${failed_services[*]}"
            exit 1
          fi
          
          echo "::endgroup::"
      
      - name: Comprehensive Verification
        run: |
          echo "::group::Comprehensive Service Check"
          
          python3 << 'EOF'
          import requests
          import time
          import sys
          
          services = {
              'Gateway': 'https://bhiv-hr-gateway-901a.onrender.com',
              'AI Agent': 'https://bhiv-hr-agent-o6nx.onrender.com'
          }
          
          endpoints = ['/health', '/health/detailed', '/metrics']
          critical_failed = False
          
          for name, base_url in services.items():
              print(f"\n🔍 {name} Verification:")
              
              for endpoint in endpoints:
                  try:
                      start = time.time()
                      response = requests.get(f'{base_url}{endpoint}', timeout=12)
                      duration = time.time() - start
                      
                      if response.status_code == 200:
                          print(f"  ✅ {endpoint}: OK ({duration:.3f}s)")
                      else:
                          print(f"  ⚠️ {endpoint}: {response.status_code} ({duration:.3f}s)")
                          if endpoint == '/health':
                              critical_failed = True
                  except Exception as e:
                      print(f"  ❌ {endpoint}: {str(e)}")
                      if endpoint == '/health':
                          critical_failed = True
          
          if critical_failed:
              print("\n❌ Critical health endpoints failed")
              sys.exit(1)
          else:
              print("\n🎉 All services verified successfully!")
          EOF
          
          echo "::endgroup::"
      
      - name: Performance Baseline
        run: |
          echo "::group::Performance Check"
          
          python3 << 'EOF'
          import requests
          import time
          import statistics
          
          services = {
              'Gateway': 'https://bhiv-hr-gateway-901a.onrender.com/health',
              'AI Agent': 'https://bhiv-hr-agent-o6nx.onrender.com/health'
          }
          
          for name, url in services.items():
              times = []
              
              for i in range(3):
                  try:
                      start = time.time()
                      response = requests.get(url, timeout=10)
                      if response.status_code == 200:
                          times.append(time.time() - start)
                      time.sleep(1)
                  except Exception:
                      pass
              
              if times:
                  avg_time = statistics.mean(times)
                  print(f"{name}: {avg_time:.3f}s average")
                  
                  if avg_time > 2.0:
                      print(f"  ⚠️ High response time")
                  else:
                      print(f"  ✅ Good performance")
          EOF
          
          echo "::endgroup::"
      
      - name: Deployment Success
        if: success()
        run: |
          echo "::notice title=Deployment Successful::🚀 Fast deployment completed successfully"
          echo "::notice::All services are healthy and operational"
          echo "::notice::Gateway: https://bhiv-hr-gateway-901a.onrender.com"
          echo "::notice::AI Agent: https://bhiv-hr-agent-o6nx.onrender.com"
      
      - name: Deployment Failed
        if: failure()
        run: |
          echo "::error title=Deployment Failed::❌ Fast deployment verification failed"
          echo "::error::Check service logs and health endpoints"
          echo "::error::Manual intervention may be required"
          exit 1