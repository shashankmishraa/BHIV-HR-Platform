# Security Standards and Configuration
# BHIV HR Platform v3.2.0

security_framework:
  compliance: "OWASP Top 10"
  standards: ["ISO 27001", "SOC 2"]
  
authentication:
  method: "JWT + Bearer Token"
  session_management: "server_side"
  password_policy:
    min_length: 8
    complexity: "high"
    expiration: "90_days"
    
authorization:
  rbac: "enabled"
  roles: ["admin", "hr_manager", "recruiter", "client"]
  permissions: "granular"
  
api_security:
  rate_limiting:
    api_endpoints: "60_requests_per_minute"
    form_submissions: "10_requests_per_minute"
  input_validation: "comprehensive"
  output_sanitization: "enabled"
  
data_protection:
  encryption_at_rest: "AES-256"
  encryption_in_transit: "TLS 1.3"
  pii_handling: "gdpr_compliant"
  data_retention: "configurable"
  
vulnerability_management:
  dependency_scanning: "automated"
  security_headers: "enforced"
  sql_injection_protection: "parameterized_queries"
  xss_protection: "content_security_policy"
  
monitoring:
  security_logging: "comprehensive"
  audit_trail: "immutable"
  intrusion_detection: "enabled"
  anomaly_detection: "ml_based"
  
secrets_management:
  storage: "github_secrets"
  rotation: "automated"
  access_control: "least_privilege"
  encryption: "vault_managed"