# Docker Compose Override for Memory Management
version: '3.8'

services:
  gateway:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONOPTIMIZE=1

  agent:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONOPTIMIZE=1

  portal:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  client_portal:
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M